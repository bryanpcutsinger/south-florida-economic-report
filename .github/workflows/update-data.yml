name: Update Dashboard Data

on:
  schedule:
    # Every Monday at 6:00 AM UTC (1:00 AM Eastern)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-build.txt

      - name: Install dependencies
        run: pip install -r requirements-build.txt

      # Force a fresh BLS/FRED/IRS fetch every run. The cache is gitignored and
      # the runner is ephemeral, so this is a no-op today — but it makes the
      # "always fetch fresh" guarantee explicit instead of an accident of CI
      # state, so a newly released QCEW quarter can never be masked by a stale
      # cache if persistent caching is ever introduced.
      - name: Clear stale data caches
        run: rm -f data/cache/*.parquet

      - name: Build static dashboard
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python build.py

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'Update dashboard data'
          # Bare 'docs' (no glob) so git add recurses into docs/embeds/<county>/.
          # The 'docs/*' glob would only match top-level files and silently skip embeds.
          file_pattern: docs
